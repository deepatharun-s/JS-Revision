<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task -43 Slider with Dots Navigation</title>
    <style>
        body {
            display: flex;
            min-height: 95vh;
            align-items: center;
            justify-content: center;
            background: #cceeae;
            background: radial-gradient(circle, rgba(204, 238, 174, 1) 0%, rgba(148, 187, 233, 1) 94%);
        }

        #container {
            height: 250px;
            border-radius: 10px;
            padding: 40px;
            background-color: #a08abe;
            box-shadow: rgba(0, 0, 0, 0.07) 0px 1px 2px, rgba(0, 0, 0, 0.07) 0px 2px 4px, rgba(0, 0, 0, 0.07) 0px 4px 8px, rgba(0, 0, 0, 0.07) 0px 8px 16px, rgba(0, 0, 0, 0.07) 0px 16px 32px, rgba(0, 0, 0, 0.07) 0px 32px 64px;
        }
        span {
            cursor: pointer;
            height: 15px;
            width: 15px;
            margin: 0 2px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
        }
    </style>
</head>

<body>
    <div id="container">
        <img id="slider" width="300">
        <div id="dotsarea"></div>
    </div>

    <script src="task43.js"></script>
</body>

</html>
