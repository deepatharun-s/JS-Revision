<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task -45 Modal Popup Close Methods</title>

    <style>
        body {
            display: flex;
            min-height: 95vh;
            align-items: center;
            justify-content: center;
            background: #cceeae;
            background: radial-gradient(circle, rgba(204, 238, 174, 1) 0%, rgba(148, 187, 233, 1) 94%);
        }
        #background {
            border-radius: 10px;
            padding: 200px;
            background-color: #a08abe;
            box-shadow: rgba(0, 0, 0, 0.07) 0px 1px 2px, rgba(0, 0, 0, 0.07) 0px 2px 4px, rgba(0, 0, 0, 0.07) 0px 4px 8px, rgba(0, 0, 0, 0.07) 0px 8px 16px, rgba(0, 0, 0, 0.07) 0px 16px 32px, rgba(0, 0, 0, 0.07) 0px 32px 64px;
        }
        #overlay {
            position: fixed;
            display: none;
            width: 50%;
            height: 50%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 2;
            color: lightseagreen;
        }

        #closeBtn {
            left: 0;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="background">
        <div id="overlay">
            <button id="closeBtn">Close</button>
            <h1>Welcome to Modal Popup</h1>
            <h2>Hello,MitrahSoft</h2>
        </div>
        <button id="btn">Log IN</button>
    </div>


    <script src="task45.js"></script>
</body>

</html>
