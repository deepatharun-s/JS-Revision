<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task -31 Basic Drag & Drop Between Two Boxes</title>

    <style>
        #availItems{
            width: 250px;
            height: 150px;
            border: 1px solid black;
        }
        #selectedItems{
            width: 250px;
            height: 150px;
            border: 1px solid black;
        }

        body {
            display: flex;
            min-height: 95vh;
            align-items: center;
            justify-content: center;
            background-color: rgb(161, 206, 198);
        }

        #container {
            border-radius: 10px;
            padding: 40px;
            background-color: #f5b785;
            box-shadow: rgba(0, 0, 0, 0.07) 0px 1px 2px, rgba(0, 0, 0, 0.07) 0px 2px 4px, rgba(0, 0, 0, 0.07) 0px 4px 8px, rgba(0, 0, 0, 0.07) 0px 8px 16px, rgba(0, 0, 0, 0.07) 0px 16px 32px, rgba(0, 0, 0, 0.07) 0px 32px 64px;
        }

        label {
            font-size: 20px;
        }
    </style>
</head>

<body>
    <div id="container">

    <div id="availItems">
        <h2>Available Items</h2>
        <div class="item" id="item1" draggable="true">Item 1</div>
        <div class="item" id="item2" draggable="true">Item 2</div>
        <div class="item" id="item3" draggable="true">Item 3</div>
    </div><br>
    <div id="selectedItems"><h2>Selected Items</h2></div>
    </div>


    <script src="task31.js"></script>

</body>

</html>
