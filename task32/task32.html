<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task -32 Drag & Drop Reordering List</title>

    <style>
        #dragList {
            width: 250px;
            height: 150px;
            border: 1px solid black;
        }

        body {
            display: flex;
            min-height: 95vh;
            align-items: center;
            justify-content: center;
            background-color: rgb(161, 206, 198);
        }

        #container {
            border-radius: 10px;
            padding: 40px;
            background-color: #f5b785;
            box-shadow: rgba(0, 0, 0, 0.07) 0px 1px 2px, rgba(0, 0, 0, 0.07) 0px 2px 4px, rgba(0, 0, 0, 0.07) 0px 4px 8px, rgba(0, 0, 0, 0.07) 0px 8px 16px, rgba(0, 0, 0, 0.07) 0px 16px 32px, rgba(0, 0, 0, 0.07) 0px 32px 64px;
        }

        label {
            font-size: 20px;
        }
    </style>
</head>

<body>
    <div id="container">
        <div id="dragList">
            <h2>List of Tasks</h2>
            <div draggable="true">Task A</div>
            <div draggable="true">Task B</div>
            <div draggable="true">Task C</div>
        </div>
    </div>

    <script src="task32.js"></script>

</body>

</html>
