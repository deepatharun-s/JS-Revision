<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task -50 API Pagination</title>

    <style>
        body {
            display: flex;
            min-height: 95vh;
            align-items: center;
            justify-content: center;
            background: #cceeae;
            background: radial-gradient(circle, rgba(204, 238, 174, 1) 0%, rgba(148, 187, 233, 1) 94%);
        }

        #container {
            border-radius: 10px;
            padding: 40px;
            background-color: #a08abe;
            box-shadow: rgba(0, 0, 0, 0.07) 0px 1px 2px, rgba(0, 0, 0, 0.07) 0px 2px 4px, rgba(0, 0, 0, 0.07) 0px 4px 8px, rgba(0, 0, 0, 0.07) 0px 8px 16px, rgba(0, 0, 0, 0.07) 0px 16px 32px, rgba(0, 0, 0, 0.07) 0px 32px 64px;
        }

        input {
            width: 50px;
            height: 30px;
        }

        button {
            padding: 10px;
            border: 1px solid whitesmoke;
            border-radius: 10px;
            background-color: rgb(43, 122, 73);
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: rgb(33, 75, 49);
        }
    </style>
</head>

<body>
    <div id="container">

        <h2>API Pagination</h2>


        <div id="list"></div>

        <button onclick="loadPage(-1)">Prev</button>
        <button onclick="loadPage(1)">Next</button>
    </div>

    <script src="task50.js"></script>

</body>

</html>
