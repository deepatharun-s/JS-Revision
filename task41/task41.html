<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task -41 Basic Image Slider</title>

    <style>
        body {
            display: flex;
            min-height: 95vh;
            align-items: center;
            justify-content: center;background: #cceeae;
background: radial-gradient(circle, rgba(204, 238, 174, 1) 0%, rgba(148, 187, 233, 1) 94%);
        }

        #container {
            height: 350px;
            border-radius: 10px;
            padding: 40px;
            background-color: #a08abe;
            box-shadow: rgba(0, 0, 0, 0.07) 0px 1px 2px, rgba(0, 0, 0, 0.07) 0px 2px 4px, rgba(0, 0, 0, 0.07) 0px 4px 8px, rgba(0, 0, 0, 0.07) 0px 8px 16px, rgba(0, 0, 0, 0.07) 0px 16px 32px, rgba(0, 0, 0, 0.07) 0px 32px 64px;
        }

        #prev,#next {
            padding: 10px;
            border: 1px solid whitesmoke;
            border-radius: 10px;
            background-color: rgb(54, 129, 190);
            color: white;
            cursor: pointer;
        }

    </style>
</head>

<body>
    <div id="container">
        <h1>Basic Image Slider</h1>
        <button id="prev">Previous</button>
        <img id="slider" width="300">
        <button id="next">Next</button>
    </div>

    <script src="task41.js"></script>
</body>

</html>
